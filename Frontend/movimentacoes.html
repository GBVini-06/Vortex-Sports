<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Sports - Movimentações</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="stylesheet" href="css/movimentacoes.css">
    <link rel="icon" href="assets/Vortex sports.png" type="image/png">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo-text">VORTEX<span>SPORTS</span></h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Painel Geral</span>
                </a>
                <a href="produtos.html" class="nav-item">
                    <i data-lucide="package"></i>
                    <span>Produtos</span>
                </a>
                <a href="movimentacoes.html" class="nav-item active">
                    <i data-lucide="arrow-left-right"></i>
                    <span>Movimentações</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="nav-item text-danger" id="btnSair">
                    <i data-lucide="log-out"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 class="page-title">Histórico de Movimentações</h1>
                    <p class="page-subtitle">Registre e acompanhe as entradas e saídas de estoque.</p>
                </div>
                <div class="user-profile">
                    <div class="avatar"><i data-lucide="user"></i></div>
                    <span id="nomeUtilizador">Carregando...</span>
                </div>
            </header>

            <section class="table-section">
                <div class="section-header">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="inputFiltro" placeholder="Filtrar por produto...">
                    </div>
                    <button id="btnNovaMovimentacao" class="btn-primary">
                        <i data-lucide="plus"></i> Registrar Movimentação
                    </button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Data / Hora</th>
                                <th>Produto</th>
                                <th>Tipo</th>
                                <th>Quantidade</th>
                                <th>Responsável</th>
                            </tr>
                        </thead>

                        <tbody id="tabela-movimentacoes">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 20px;">
                                    Carregando movimentações do banco de dados...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modalMovimentacao" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Movimentação</h2>
                <button id="closeModal" class="close-btn"><i data-lucide="x"></i></button>
            </div>
            
            <form id="formMovimentacao" class="modal-form">
                <div class="input-group">
                    <label>Produto</label>
                    <select id="produtoSelect" required>
                        <option value="">Carregando produtos...</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Tipo de Movimentação</label>
                    <select id="tipoMovimentacao" required>
                        <option value="">Selecione o tipo...</option>
                        <option value="entrada">Entrada (+)</option>
                        <option value="saida">Saída (-)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Quantidade</label>
                    <input type="number" id="quantidadeInput" min="1" placeholder="Ex: 10" required>
                </div>
                
                <div class="modal-actions mt-4">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnSalvar">Confirmar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/supabase-config.js"></script>
    
    <script src="js/auth.js"></script>]
    
    <script src="js/movimentacoes.js"></script>
</body>
</html>
