<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Sports - Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="stylesheet" href="css/produtos.css">
    <link rel="icon" href="assets/Vortex sports.png" type="image/png">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo-text">VORTEX<span>SPORTS</span></h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Painel Geral</span>
                </a>
                <a href="produtos.html" class="nav-item active">
                    <i data-lucide="package"></i>
                    <span>Produtos</span>
                </a>
                <a href="movimentacoes.html" class="nav-item">
                    <i data-lucide="arrow-left-right"></i>
                    <span>Movimentações</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="nav-item text-danger" id="btnSair">
                    <i data-lucide="log-out"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 class="page-title">Gestão de Produtos</h1>
                    <p class="page-subtitle">Adicione, edite ou remova itens do seu catálogo.</p>
                </div>
                <div class="user-profile">
                    <div class="avatar"><i data-lucide="user"></i></div>
                    <span id="nomeUtilizador">Carregando...</span>
                </div>
            </header>

            <section class="table-section">
                <div class="section-header">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="inputBusca" placeholder="Buscar produto...">
                    </div>
                    <button id="btnNovoProduto" class="btn-primary">
                        <i data-lucide="plus"></i> Novo Produto
                    </button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nome do Produto</th>
                                <th>Categoria</th>
                                <th>Preço (R$)</th>
                                <th>Estoque</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <template id="tpl-linha-produto">
        <tr>
            <td class="td-id id-destaque"></td>
            <td class="td-nome nome-destaque"></td>
            <td class="td-categoria"></td>
            <td class="td-preco"></td>
            <td><span class="badge td-estoque"></span></td>
            <td class="actions">
                <button class="btn-icon text-green btn-mov" title="Movimentação Rápida">
                    <i data-lucide="repeat"></i>
                </button>
                <button class="btn-icon text-blue btn-edit" title="Editar">
                    <i data-lucide="edit-2"></i>
                </button>

                <button class="btn-icon text-danger btn-del" title="Excluir">
                    <i data-lucide="trash-2"></i>
                </button>
            </td>
        </tr>
    </template>

    <template id="tpl-notificacao">
        <div class="notificacao">
            <button class="notificacao-fechar">&times;</button>
            <div class="notificacao-titulo">⚠️ Estoque Baixo!</div>
            <div class="notificacao-texto">
                O produto <strong class="notif-nome"></strong> atingiu níveis críticos.<br>
                Restam apenas <strong class="notif-qtd"></strong> unidades (Mínimo: <span class="notif-min"></span>).
            </div>
        </div>
    </template>

    <div id="container-notificacoes"></div>

    <div id="modalProduto" class="modal-overlay hidden">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="modalTitle">Cadastrar Produto</h2>
                <button id="closeModal" class="close-btn" onclick="fecharTodosModais()"><i data-lucide="x"></i></button>
            </div>
            
            <form id="formProduto" class="modal-form">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Nome do Produto</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: Bola de Futebol Oficial" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="categoria" name="categoria" required>
                            <option value="">Selecione...</option>
                            <option value="Equipamentos">Equipamentos</option>
                            <option value="Calçados">Calçados</option>
                            <option value="Vestuário">Vestuário</option>
                            <option value="Acessórios">Acessórios</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label>Preço de Venda (R$)</label>
                        <input type="number" id="preco" name="preco" step="0.01" min="0" placeholder="0.00" required>
                    </div>

                    <div class="input-group">
                        <label>Estoque Atual</label>
                        <input type="number" id="estoque" name="estoque" min="0" placeholder="Ex: 10" required>
                    </div>

                    <div class="input-group">
                        <label>Estoque Mínimo (Alerta)</label>
                        <input type="number" id="estoque_minimo" name="estoque_minimo" min="1" placeholder="Ex: 5" required>
                    </div>
                </div>
                
                <div class="modal-actions mt-4">
                    <button type="button" class="btn-secondary" id="btnCancelar" onclick="fecharTodosModais()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalMovimentacao" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Movimentação</h2>
                <button type="button" class="btn-fechar-modal" onclick="fecharTodosModais()">&times;</button>
            </div>

            <form id="formMovimentacao">
                <input type="hidden" id="mov_produto_id">
                
                <div id="mov_nome_produto" class="mov-nome-destaque">Nome do Produto Aqui</div>
                
                <div class="input-group mov-input-group">
                    <label for="mov_tipo" class="mov-label">Tipo de Movimentação:</label>
                    <select id="mov_tipo" class="mov-select" required>
                        <option value="entrada">Entrada (+)</option>
                        <option value="saida">Saída (-)</option>
                    </select>
                </div>

                <div class="input-group mov-input-group">
                    <label for="mov_quantidade" class="mov-label">Quantidade:</label>
                    <input type="number" id="mov_quantidade" class="mov-input" min="1" required>
                </div>

                <div class="modal-actions acoes-movimentacao">
                    <button type="button" class="btn-secondary mov-btn-cancelar" onclick="fecharTodosModais()">Cancelar</button>
                    <button type="submit" class="btn-primary mov-btn-confirmar">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
